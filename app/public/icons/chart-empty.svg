<svg width="240" height="160" viewBox="0 0 240 160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Grid lines (subtle) -->
  <line x1="20" y1="40"  x2="220" y2="40"  stroke="#1C1F2E" stroke-width="1"/>
  <line x1="20" y1="70"  x2="220" y2="70"  stroke="#1C1F2E" stroke-width="1"/>
  <line x1="20" y1="100" x2="220" y2="100" stroke="#1C1F2E" stroke-width="1"/>
  <line x1="20" y1="130" x2="220" y2="130" stroke="#1C1F2E" stroke-width="1"/>
  <!-- Vertical grid -->
  <line x1="60"  y1="30" x2="60"  y2="140" stroke="#1C1F2E" stroke-width="1"/>
  <line x1="100" y1="30" x2="100" y2="140" stroke="#1C1F2E" stroke-width="1"/>
  <line x1="140" y1="30" x2="140" y2="140" stroke="#1C1F2E" stroke-width="1"/>
  <line x1="180" y1="30" x2="180" y2="140" stroke="#1C1F2E" stroke-width="1"/>

  <!-- Dashed placeholder line (flat / no data) -->
  <line x1="30" y1="85" x2="210" y2="85" stroke="#2A2E42" stroke-width="1.5" stroke-dasharray="6 4"/>

  <!-- Ghost candles (dim, evenly spaced) -->
  <!-- Candle 1 -->
  <rect x="46" y="65" width="8" height="28" rx="1" fill="#1C1F2E"/>
  <line x1="50" y1="58" x2="50" y2="100" stroke="#1C1F2E" stroke-width="1.5"/>
  <!-- Candle 2 -->
  <rect x="86" y="72" width="8" height="20" rx="1" fill="#1C1F2E"/>
  <line x1="90" y1="65" x2="90" y2="98" stroke="#1C1F2E" stroke-width="1.5"/>
  <!-- Candle 3 -->
  <rect x="126" y="68" width="8" height="24" rx="1" fill="#1C1F2E"/>
  <line x1="130" y1="62" x2="130" y2="98" stroke="#1C1F2E" stroke-width="1.5"/>
  <!-- Candle 4 -->
  <rect x="166" y="74" width="8" height="18" rx="1" fill="#1C1F2E"/>
  <line x1="170" y1="68" x2="170" y2="97" stroke="#1C1F2E" stroke-width="1.5"/>

  <!-- Centre icon: bar-chart glyph -->
  <g opacity="0.35">
    <rect x="107" y="74" width="6" height="18" rx="1" fill="#9945FF"/>
    <rect x="116" y="68" width="6" height="24" rx="1" fill="#9945FF"/>
    <rect x="125" y="78" width="6" height="14" rx="1" fill="#9945FF"/>
  </g>

  <!-- Axes -->
  <line x1="20" y1="30" x2="20" y2="140" stroke="#2A2E42" stroke-width="1"/>
  <line x1="20" y1="140" x2="220" y2="140" stroke="#2A2E42" stroke-width="1"/>
</svg>
